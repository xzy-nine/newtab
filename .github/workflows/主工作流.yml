name: 主工作流
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（只预览版本和 changelog，不实际发布）"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: 测试与构建
    uses: ./.github/workflows/test.yml
    secrets: inherit
    permissions:
      contents: read
      actions: read

  release:
    name: Release
    needs: test
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release: ${{ steps.release_meta.outputs.new_release || 'false' }}
      release_version: ${{ steps.release_meta.outputs.release_version }}
      release_git_tag: ${{ steps.release_meta.outputs.release_git_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run build
          bun run build:firefox

      - name: Capture current release tag
        id: release_base
        run: |
          latest_tag="$(git tag --sort=-version:refname | head -n 1)"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Release
        id: semantic_release
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            bunx semantic-release --dry-run
          else
            bunx semantic-release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Capture release metadata
        if: ${{ !inputs.dry_run }}
        id: release_meta
        run: |
          before_tag="${{ steps.release_base.outputs.latest_tag }}"
          after_tag="$(git tag --sort=-version:refname | head -n 1)"

          if [ -n "$after_tag" ] && [ "$after_tag" != "$before_tag" ]; then
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "release_git_tag=$after_tag" >> "$GITHUB_OUTPUT"
            echo "release_version=${after_tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

  publish-stores:
    name: 发布到应用商店
    needs: release
    if: needs.release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_git_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Zip extensions
        run: |
          bun run zip
          bun run zip:edge
          bun run zip:firefox

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release.outputs.release_git_tag }}" \
            .output/*-chrome.zip \
            .output/*-edge.zip \
            .output/*-firefox.zip \
            --clobber

      - name: Submit to Edge store
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          bunx wxt submit \
            --edge-zip .output/*-chrome.zip
