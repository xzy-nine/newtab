name: 主工作流
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（只预览版本和 changelog，不实际发布）"
        type: boolean
        default: false
      force_publish:
        description: "强制发布（即使无新 commit，也重新构建并上传到 release）"
        type: boolean
        default: false
      publish_to_edge:
        description: "强制发布时也发布到 Edge 商店"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: 测试与构建
    uses: ./.github/workflows/test.yml
    secrets: inherit
    permissions:
      contents: read
      actions: read

  release:
    name: Release
    needs: test
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_version: ${{ steps.set_outputs.outputs.release_version }}
      release_git_tag: ${{ steps.set_outputs.outputs.release_git_tag }}
      should_publish: ${{ steps.set_outputs.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: 读取当前版本号
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 获取最新 tag（发布前）
        id: before_tag
        run: |
          TAG="$(git tag --sort=-version:refname | head -n 1)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Release（semantic-release）
        if: ${{ !inputs.force_publish }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            bunx semantic-release --dry-run
          else
            bunx semantic-release
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

      - name: 获取发布后的最新 tag
        id: after_tag
        run: |
          TAG="$(git tag --sort=-version:refname | head -n 1)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 设置发布标志和输出
        id: set_outputs
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          BEFORE="${{ steps.before_tag.outputs.tag }}"
          AFTER="${{ steps.after_tag.outputs.tag }}"

          if [ "${{ inputs.force_publish }}" = "true" ] && [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "📦 强制发布模式：版本 $VERSION"

            if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "🏷️ 创建 tag $VERSION..."
              git tag "$VERSION"
              git push origin "$VERSION"
            fi

            if ! gh release view "$VERSION" >/dev/null 2>&1; then
              echo "🚀 创建 release $VERSION..."
              gh release create "$VERSION" --title "发布 $VERSION" --generate-notes
            fi

            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "release_git_tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

          elif [ "${{ inputs.dry_run }}" != "true" ] && [ -n "$AFTER" ] && [ "$AFTER" != "$BEFORE" ]; then
            echo "✅ 检测到新版本：$AFTER"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "release_git_tag=$AFTER" >> "$GITHUB_OUTPUT"
            echo "release_version=$AFTER" >> "$GITHUB_OUTPUT"

          else
            echo "ℹ️ 无需发布"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "release_git_tag=" >> "$GITHUB_OUTPUT"
            echo "release_version=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-stores:
    name: 发布到应用商店
    needs: release
    if: needs.release.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_git_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run build
          bun run build:firefox

      - name: Zip extensions
        run: |
          bun run zip
          bun run zip:edge
          bun run zip:firefox

      - name: 上传构建产物（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .output/*.zip
          retention-days: 7

      - name: 上传构建产物到 Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📤 上传 assets 到 ${{ needs.release.outputs.release_git_tag }}"
          gh release upload "${{ needs.release.outputs.release_git_tag }}" \
            .output/*-chrome.zip \
            .output/*-edge.zip \
            .output/*-firefox.zip \
            --clobber
          echo "✅ assets 上传完成"

      - name: Submit to Edge store
        if: ${{ !inputs.force_publish || inputs.publish_to_edge }}
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          bunx wxt submit \
            --edge-zip .output/*-chrome.zip
