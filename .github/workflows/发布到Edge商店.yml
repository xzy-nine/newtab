name: 发布到Edge商店
on:
  workflow_call:
    inputs:
      version:
        description: "版本号"
        required: true
        type: string
      build-path:
        description: "构建包路径"
        required: true
        type: string

jobs:
  publish-to-edge:
    name: 发布到Microsoft Edge Add-ons
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 使用WXT创建构建包
        run: |
          bun run build
          bun run zip

      - name: 使用WXT提交到Edge商店
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          echo "🚀 开始提交到 Microsoft Edge Add-ons..."

          bunx wxt submit \
            --edge-zip .output/*-chrome.zip

      - name: 输出结果
        run: |
          echo "## 🚀 Edge商店发布结果" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | \`${{ inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 状态 | ✅ 提交成功 |" >> $GITHUB_STEP_SUMMARY
